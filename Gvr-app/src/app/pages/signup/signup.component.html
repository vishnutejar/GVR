<div class="auth-page signup-page">
  <div class="auth-image mobile-hidden">
    <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=900&q=80" alt="Signup for dental care" />
  </div>

  <div class="auth-panel fade-up">
    <div class="auth-hero">
      <h1>Create your patient account</h1>
      <p>Sign up to receive appointment reminders, treatment updates, and personalized dental care.</p>
    </div>

    <form class="auth-form" (ngSubmit)="submitSignup()">
      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input id="fullName" name="fullName" type="text" [(ngModel)]="fullName" required placeholder="Enter your full name" />
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input id="email" name="email" type="email" [(ngModel)]="email" required placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" [(ngModel)]="password" required placeholder="Create a password" />
      </div>
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input id="phone" name="phone" type="tel" [(ngModel)]="phone" required placeholder="Enter your phone number" />
      </div>

      <div class="message success" *ngIf="success()">{{ success() }}</div>
      <div class="message error" *ngIf="error()">{{ error() }}</div>

      <button class="btn btn-primary" type="submit" [disabled]="loading()">
        {{ loading() ? 'Creating account...' : 'Sign Up' }}
      </button>
    </form>
  </div>
</div>
