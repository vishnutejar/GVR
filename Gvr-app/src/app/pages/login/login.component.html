<div class="auth-page">
  <div class="auth-panel fade-up">
    <div class="auth-hero">
      <h1>Login to your patient portal</h1>
      <p>Access appointments, updates, and personalized dental care details.</p>
    </div>

    <form class="auth-form" (ngSubmit)="submitLogin()">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" [(ngModel)]="email" required placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" [(ngModel)]="password" required placeholder="Enter your password" />
      </div>

      <div class="message success" *ngIf="success()">{{ success() }}</div>
      <div class="message error" *ngIf="error()">{{ error() }}</div>

      <button class="btn btn-primary" type="submit" [disabled]="loading()">
        {{ loading() ? 'Signing in...' : 'Login' }}
      </button>
    </form>
  </div>

  <div class="auth-image">
    <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=900&q=80" alt="Dental clinic login" />
  </div>
</div>
